server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://db_cliente:3306/db_cliente_proyecto?useSSL=false&serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

microservicio:
  carrito:
    url: http://carrito-service:8083/api/v1/Carrito
  pago:
    url: http://pago-service:8084/api/v1/boletas
  inventario:
    url: http://inventario-service:8081/api/products

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true