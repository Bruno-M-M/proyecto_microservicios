spring.application.name=carrito_compras

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/db_carrito_compras
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

microservicio.clientes.url=http://localhost:8082/api/clientes
microservicio.inventario.url=http://localhost:8081/api/products

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html