server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://db_cliente_proyecto:3306/db_cliente_proyecto?useSSL=false&serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

microservicio:
  carrito:
    url: http://carrito_service:8083/api/v1/Carrito
  pago:
    url: http://pago_service:8084/api/v1/boletas
  inventario:
    url: http://inventario_service:8081/api/products

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1
    instance-id: localhost:${spring.application.name}:${server.port}