version: '3.8'

services:
    db_boletas:
      image: mysql:8.4
      container_name: db_boletas
      environment:
        MYSQL_DATABASE: db_boletas
        MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      ports:
        - "3306:3306"

    pago-service:
      build: .
      container_name: pago_service
      ports:
        - "8084:8084"
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://db_boletas:3306/db_boletas?useSSL=false&serverTimezone=UTC
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD:
      depends_on:
        - db_boletas