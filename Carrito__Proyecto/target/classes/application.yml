server:
  port: 8083

spring:
  application:
    name: carrito-compras
  datasource:
    url: jdbc:mysql://localhost:3306/db_carrito_compras
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  cloud:                          # <- agregar esto
    loadbalancer:
      retry:
        enabled: false

microservicio:
  clientes:
    url: http://cliente/api/clientes      # <- minúsculas
  inventario:
    url: http://inventario/api/products   # <- minúsculas

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
  hateoasRestHandlerMappingEnabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/